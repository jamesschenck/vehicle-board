<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call-Up Board</title>
<style>
  :root{
    --bg:#0f1420; --panel:#171d2b; --panel-2:#1e2637; --line:#2a3244;
    --text:#e8ecf4; --muted:#8a93a6; --accent:#3b82f6;
    --good:#22c55e; --danger:#ef4444; --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; padding:0 0 96px;
  }
  header{
    position:sticky;top:0;z-index:10;background:rgba(15,20,32,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); padding:14px 18px;
  }
  .htop{display:flex;align-items:center;justify-content:space-between;gap:10px}
  header h1{margin:0;font-size:18px;font-weight:700}
  .count{font-size:13px;color:var(--muted);margin-top:2px}
  .copybtn{
    flex:none;background:var(--panel-2);border:1.5px solid var(--line);color:var(--text);
    padding:9px 13px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
  }
  .copybtn:active{transform:scale(.97)}
  .copybtn.done{background:var(--good);color:#04210f;border-color:var(--good)}
  .banner{margin-top:10px;padding:9px 12px;border-radius:10px;font-size:12.5px;line-height:1.4;
    background:#3a2a12;border:1px solid #5c431c;color:#f6c877;display:none}
  .banner.show{display:block}
  .wrap{max-width:760px;margin:0 auto;padding:16px}

  .cards{display:flex;flex-direction:column;gap:12px}
  .veh{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 14px 12px;cursor:pointer;transition:.12s;border-left:4px solid var(--line)}
  .veh:active{transform:scale(.995)}
  .veh.gone{opacity:.55}
  .veh .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .idline{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{background:var(--accent-soft,#1d3a63);color:#9cc2ff;font-weight:800;font-size:13px;
    padding:3px 9px;border-radius:8px;letter-spacing:.3px}
  .name{font-size:16px;font-weight:700;line-height:1.2}
  .vehmodel{font-size:14px;color:var(--muted);margin-top:3px}
  .pill{flex:none;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  .meta{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:10px;font-size:13.5px}
  .meta .m{display:flex;align-items:center;gap:6px}
  .meta .lbl{color:var(--muted);font-size:12px}
  .veh .foot{margin-top:9px;font-size:11.5px;color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px;line-height:1.5}

  .fab{position:fixed;right:18px;bottom:20px;z-index:20;background:var(--accent);color:#fff;border:none;
    border-radius:99px;padding:15px 22px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(59,130,246,.45)}
  .fab:active{transform:scale(.97)}

  .modal{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center}
  .modal.show{display:flex}
  .sheet{background:var(--panel);width:100%;max-width:760px;border-radius:16px 16px 0 0;
    border:1px solid var(--line);padding:18px;max-height:92vh;overflow:auto}
  .sheet h3{margin:0 0 14px;font-size:16px}
  .rowflex{display:flex;gap:10px}
  .rowflex > div{flex:1}
  label.lbl2{display:block;font-size:12.5px;color:var(--muted);margin:14px 0 6px;font-weight:600}
  .sheet .rowflex:first-of-type label.lbl2{margin-top:0}
  input[type=text],textarea{width:100%;background:var(--panel-2);border:1.5px solid var(--line);border-radius:10px;
    color:var(--text);font-size:16px;padding:12px 14px;font-family:inherit;outline:none}
  input:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:52px}
  .lblrow{display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px}
  .lblrow .lbl2{margin:0}
  select.selectfield{width:100%;background:var(--panel-2);border:1.5px solid var(--line);border-radius:10px;
    color:var(--text);font-size:16px;padding:12px 40px 12px 14px;font-family:inherit;outline:none;
    -webkit-appearance:none;appearance:none;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path fill="%238a93a6" d="M6,8L0,0H12Z"/></svg>');
    background-repeat:no-repeat;background-position:right 14px center}
  select.selectfield:focus{border-color:var(--accent)}
  .managebtn{background:none;border:none;color:var(--accent);font-size:12.5px;font-weight:700;cursor:pointer;padding:0}
  .locrow{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:14px}
  .locrow .x{background:none;border:none;color:var(--danger);font-size:20px;font-weight:700;cursor:pointer;line-height:1;padding:0 4px}
  .locempty{color:var(--muted);font-size:13px;padding:8px 0}
  .statusgrid{display:flex;flex-wrap:wrap;gap:8px}
  .sbtn{padding:11px 14px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel-2);
    color:var(--text);font-size:14px;font-weight:600;cursor:pointer;flex:1 1 auto;min-width:110px;text-align:center}
  .sbtn.sel{color:#fff;border-color:transparent}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  button.btn{border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;flex:1}
  .btn.save{background:var(--accent);color:#fff}
  .btn.del{background:transparent;color:var(--danger);border:1.5px solid var(--danger)!important;flex:0 0 auto;padding:14px 18px}
  .btn.cancel{background:var(--panel-2);color:var(--text);border:1.5px solid var(--line)!important;flex:0 0 auto;padding:14px 18px}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--good);color:#04210f;
    padding:10px 18px;border-radius:99px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div>
      <h1>Call-Up Board</h1>
      <div class="count" id="count">Loading…</div>
    </div>
    <button class="copybtn" id="copyBtn">Copy list</button>
  </div>
  <div class="banner" id="banner"></div>
</header>

<div class="wrap">
  <div class="cards" id="cards"></div>
</div>

<button class="fab" id="addBtn">+ Add vehicle</button>

<div class="modal" id="modal">
  <div class="sheet">
    <h3 id="sheetTitle">Add vehicle</h3>

    <div class="rowflex">
      <div>
        <label class="lbl2">Tag #</label>
        <input type="text" id="f-tag" placeholder="T37 / #50">
      </div>
      <div>
        <label class="lbl2">Time</label>
        <input type="text" id="f-eta" placeholder="8am / 4p">
      </div>
    </div>

    <label class="lbl2">Name</label>
    <input type="text" id="f-name" placeholder="Customer last name">

    <label class="lbl2">Vehicle</label>
    <input type="text" id="f-vehicle" placeholder="e.g. Honda Civic">

    <label class="lbl2">Status</label>
    <div class="statusgrid" id="statusGrid"></div>

    <div class="lblrow">
      <label class="lbl2">Location / spot</label>
      <button type="button" class="managebtn" id="manageLocBtn">Manage</button>
    </div>
    <select id="f-location" class="selectfield"></select>

    <label class="lbl2">Notes (optional)</label>
    <textarea id="f-notes" placeholder="Anything the team should know"></textarea>

    <div class="modal-actions">
      <button class="btn del" id="delBtn" style="display:none">Delete</button>
      <button class="btn cancel" id="cancelBtn">Cancel</button>
      <button class="btn save" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="locModal">
  <div class="sheet">
    <h3>Manage locations</h3>
    <div id="locList"></div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <input type="text" id="newLoc" placeholder="Add a location…" style="flex:1">
      <button class="btn save" id="addLocBtn" style="flex:0 0 auto;padding:12px 16px">Add</button>
    </div>
    <div class="modal-actions">
      <button class="btn cancel" id="closeLocBtn" style="flex:1">Done</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Saved ✓</div>

<script>
/* ============================================================
   CONFIG — paste your Supabase values here to turn on live sync.
   Until then, the app runs in on-device Preview mode.
   ============================================================ */
const SUPABASE_URL = "";       // e.g. https://abcxyz.supabase.co
const SUPABASE_ANON_KEY = "";  // the "anon public" key (safe to be public)

/* Status stages — matches your Slack lists */
const STATUSES = [
  { key:"call_up",  label:"Call-up",       color:"#3b82f6" },
  { key:"leaving",  label:"Leaving today", color:"#22c55e" },
  { key:"gone",     label:"Gone",          color:"#6b7280" },
];
const statusOf = k => STATUSES.find(s=>s.key===k) || STATUSES[0];

/* Titles used when copying a list out to Slack */
const LIST_TITLES = { all:"VEHICLE CALL-UPS", call_up:"PRELIMINARY CALL-UPS", leaving:"VEHICLES LEAVING TODAY", gone:"GONE" };

/* Locations — configurable dropdown list (persisted on this device) */
const LOC_KEY = "callup_locations_v1";
const DEFAULT_LOCATIONS = ["Front lot","Back lot","Bay 1","Bay 2","Bay 3","Alignment rack"];
function loadLocations(){ try{ const v=JSON.parse(localStorage.getItem(LOC_KEY)); return Array.isArray(v)?v:DEFAULT_LOCATIONS.slice(); }catch(e){ return DEFAULT_LOCATIONS.slice(); } }
function saveLocations(){ localStorage.setItem(LOC_KEY, JSON.stringify(locations)); }
let locations = loadLocations();
let lastLocationValue = "";
function renderLocationSelect(current){
  const sel=document.getElementById("f-location"); const cur=current||"";
  const list=locations.slice();
  if(cur && !list.includes(cur)) list.push(cur); // keep an existing custom value visible
  let opts=`<option value="">— none —</option>`;
  opts+=list.map(l=>`<option value="${esc(l)}"${l===cur?" selected":""}>${esc(l)}</option>`).join("");
  opts+=`<option value="__add__">+ Add new location…</option>`;
  sel.innerHTML=opts; sel.value=cur; lastLocationValue=cur;
}

/* ============================================================
   DATA STORE — Local (Preview) or Supabase (Live) behind one interface
   ============================================================ */
const LIVE = !!(SUPABASE_URL && SUPABASE_ANON_KEY);
let store;

function localStore(){
  const KEY = "callup_board_v1";
  const read = () => { try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ return []; } };
  const write = arr => localStorage.setItem(KEY, JSON.stringify(arr));
  let cb = ()=>{};
  window.addEventListener("storage", e=>{ if(e.key===KEY) cb(); });
  return {
    live:false,
    async list(){ return read().sort((a,b)=>(b.updated_at||"").localeCompare(a.updated_at||"")); },
    async save(v){
      const arr=read(), now=new Date().toISOString();
      if(v.id){ const i=arr.findIndex(x=>x.id===v.id); if(i>=0) arr[i]={...v,updated_at:now}; }
      else { arr.push({...v, id:crypto.randomUUID(), updated_at:now}); }
      write(arr); cb();
    },
    async remove(id){ write(read().filter(x=>x.id!==id)); cb(); },
    onChange(fn){ cb=fn; },
  };
}

function supabaseStore(){
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const TABLE="vehicles"; let cb=()=>{};
  sb.channel("veh-rt").on("postgres_changes",{event:"*",schema:"public",table:TABLE},()=>cb()).subscribe();
  return {
    live:true,
    async list(){
      const {data,error}=await sb.from(TABLE).select("*").order("updated_at",{ascending:false});
      if(error){ console.error(error); return []; } return data;
    },
    async save(v){
      const row={ tag:v.tag, name:v.name, vehicle:v.vehicle, status:v.status, location:v.location, eta:v.eta, notes:v.notes, updated_at:new Date().toISOString() };
      if(v.id){ await sb.from(TABLE).update(row).eq("id",v.id); } else { await sb.from(TABLE).insert(row); }
    },
    async remove(id){ await sb.from(TABLE).delete().eq("id",id); },
    onChange(fn){ cb=fn; },
  };
}

/* ============================================================ UI ============================================================ */
let vehicles=[], activeFilter="all", editing=null, selectedStatus=STATUSES[0].key;

const filtered = () => activeFilter==="all" ? vehicles : vehicles.filter(v=>v.status===activeFilter);

async function refresh(){ vehicles=await store.list(); render(); }

function render(){
  renderCards();
  const n=vehicles.filter(v=>v.status!=="gone").length;
  document.getElementById("count").textContent =
    `${n} active` + (store.live ? " · live" : " · preview (this device only)");
}

function renderCards(){
  const el=document.getElementById("cards"); const list=filtered();
  if(!list.length){ el.innerHTML=`<div class="empty">Nothing here yet.<br>Tap <b>+ Add vehicle</b> to put one on the board.</div>`; return; }
  el.innerHTML=list.map(v=>{
    const s=statusOf(v.status);
    return `<div class="veh ${v.status==='gone'?'gone':''}" data-id="${v.id}" style="border-left-color:${s.color}">
      <div class="top">
        <div>
          <div class="idline">
            ${v.tag?`<span class="tag">${esc(fmtTag(v.tag))}</span>`:""}
            <span class="name">${esc(v.name)||"(no name)"}</span>
          </div>
          <div class="vehmodel">${esc(v.vehicle)||"—"}</div>
        </div>
        <span class="pill" style="background:${s.color}22;color:${s.color}">${s.label}</span>
      </div>
      <div class="meta">
        <div class="m"><span class="lbl">🕒</span> ${esc(v.eta)||"—"}</div>
        ${v.location?`<div class="m"><span class="lbl">📍</span> ${esc(v.location)}</div>`:""}
      </div>
      ${v.notes?`<div class="foot">📝 ${esc(v.notes)}</div>`:""}
      <div class="foot">Updated ${timeAgo(v.updated_at)}</div>
    </div>`;
  }).join("");
  el.querySelectorAll(".veh").forEach(c=>c.onclick=()=>openModal(vehicles.find(x=>x.id===c.dataset.id)));
}

/* modal */
const modal=document.getElementById("modal");
function openModal(v){
  editing=v||null;
  document.getElementById("sheetTitle").textContent=v?"Edit vehicle":"Add vehicle";
  document.getElementById("f-tag").value=v?.tag||"";
  document.getElementById("f-eta").value=v?.eta||"";
  document.getElementById("f-name").value=v?.name||"";
  document.getElementById("f-vehicle").value=v?.vehicle||"";
  renderLocationSelect(v?.location||"");
  document.getElementById("f-notes").value=v?.notes||"";
  selectedStatus=v?.status||STATUSES[0].key;
  renderStatusGrid();
  document.getElementById("delBtn").style.display=v?"block":"none";
  modal.classList.add("show");
  if(!v) setTimeout(()=>document.getElementById("f-tag").focus(),50);
}
function closeModal(){ modal.classList.remove("show"); editing=null; }

function renderStatusGrid(){
  const el=document.getElementById("statusGrid");
  el.innerHTML=STATUSES.map(s=>{
    const sel=s.key===selectedStatus;
    return `<div class="sbtn ${sel?'sel':''}" data-s="${s.key}" style="${sel?`background:${s.color}`:''}">${s.label}</div>`;
  }).join("");
  el.querySelectorAll(".sbtn").forEach(b=>b.onclick=()=>{selectedStatus=b.dataset.s;renderStatusGrid();});
}

document.getElementById("addBtn").onclick=()=>openModal(null);
document.getElementById("cancelBtn").onclick=closeModal;
modal.onclick=e=>{ if(e.target===modal) closeModal(); };

document.getElementById("saveBtn").onclick=async()=>{
  const v={
    id:editing?.id,
    tag:val("f-tag"), eta:val("f-eta"), name:val("f-name"),
    vehicle:val("f-vehicle"), location:val("f-location"), notes:val("f-notes"),
    status:selectedStatus,
  };
  if(v.location==="__add__") v.location="";
  if(!v.name && !v.tag){ document.getElementById("f-tag").focus(); return; }
  await store.save(v); closeModal(); toast("Saved ✓");
  if(!store.live) refresh();
};
document.getElementById("delBtn").onclick=async()=>{
  if(!editing) return;
  if(!confirm("Remove this vehicle from the board?")) return;
  await store.remove(editing.id); closeModal(); toast("Removed");
  if(!store.live) refresh();
};

/* location dropdown: "+ Add new location…" inline, and the Manage modal */
const locSelect=document.getElementById("f-location");
locSelect.onchange=()=>{
  if(locSelect.value==="__add__"){
    const name=(prompt("New location name:")||"").trim();
    if(name){ if(!locations.includes(name)){ locations.push(name); saveLocations(); } renderLocationSelect(name); }
    else { renderLocationSelect(lastLocationValue); }
  } else { lastLocationValue=locSelect.value; }
};

const locModal=document.getElementById("locModal");
document.getElementById("manageLocBtn").onclick=()=>{ renderLocList(); locModal.classList.add("show"); };
function closeLocModal(){ locModal.classList.remove("show"); renderLocationSelect(lastLocationValue); }
document.getElementById("closeLocBtn").onclick=closeLocModal;
locModal.onclick=e=>{ if(e.target===locModal) closeLocModal(); };
document.getElementById("addLocBtn").onclick=()=>{
  const inp=document.getElementById("newLoc"); const name=inp.value.trim();
  if(!name) return;
  if(!locations.includes(name)) locations.push(name);
  saveLocations(); inp.value=""; renderLocList();
};
document.getElementById("newLoc").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); document.getElementById("addLocBtn").click(); } });
function renderLocList(){
  const el=document.getElementById("locList");
  if(!locations.length){ el.innerHTML=`<div class="locempty">No locations yet. Add one below.</div>`; return; }
  el.innerHTML=locations.map((l,i)=>`<div class="locrow"><span>${esc(l)}</span><button class="x" data-i="${i}" title="Remove">×</button></div>`).join("");
  el.querySelectorAll(".x").forEach(b=>b.onclick=()=>{ locations.splice(+b.dataset.i,1); saveLocations(); renderLocList(); });
}

/* Copy current list as a Slack-ready message: Name / Vehicle / #Tag / Time */
document.getElementById("copyBtn").onclick=async(e)=>{
  const list=filtered();
  if(!list.length){ toast("Nothing to copy"); return; }
  const lines=[LIST_TITLES[activeFilter]||"VEHICLES"];
  list.forEach(v=>{
    const parts=[v.name, v.vehicle, v.tag?fmtTag(v.tag):"", v.eta].map(x=>(x||"").trim()).filter(Boolean);
    let line=parts.join(" / ");
    if(v.status==="gone") line+="  — GONE";
    lines.push(line);
  });
  const text=lines.join("\n");
  try{ await navigator.clipboard.writeText(text); }
  catch(err){ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
  const b=e.target; const o=b.textContent; b.classList.add("done"); b.textContent="Copied ✓";
  setTimeout(()=>{ b.classList.remove("done"); b.textContent=o; },1400);
  toast("List copied for Slack ✓");
};

/* helpers */
function val(id){ return document.getElementById(id).value.trim(); }
function fmtTag(t){ t=(t||"").trim(); return /^[#T]/i.test(t) ? t : "#"+t; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function timeAgo(iso){
  if(!iso) return "just now";
  const d=(Date.now()-new Date(iso))/1000;
  if(d<60) return "just now";
  if(d<3600) return Math.floor(d/60)+" min ago";
  if(d<86400) return Math.floor(d/3600)+" hr ago";
  return new Date(iso).toLocaleDateString();
}
let toastTimer;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1500); }

/* boot */
function boot(){
  store = LIVE ? supabaseStore() : localStore();
  store.onChange(refresh);
  if(!LIVE){
    const b=document.getElementById("banner"); b.className="banner show";
    b.innerHTML="⚠️ <b>Preview mode.</b> Vehicles are saved only on this device and are not shared with your team yet. Send your two Supabase values to turn on live sync.";
  }
  refresh();
}
if(LIVE){
  const s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
  s.onload=boot; s.onerror=()=>{ document.getElementById("count").textContent="Could not load sync library"; };
  document.head.appendChild(s);
}else{ boot(); }
</script>
</body>
</html>
